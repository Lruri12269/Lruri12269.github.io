<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" href="https://hiluobo.flarum.cloud/assets/files/2024-02-25/1708826723-647468-bf7c1b10-a322-4042-999f-b22407c5e15d.jpg" type="image/x-icon">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>企鹅起始页</title>
<style>
    body {
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        height: 100vh;
        background-color: #f0f0f0;
        background-image: url('https://hiluobo.freeflarum.com/assets/files/2024-03-26/1711455229-758343-c5f4ba41-cfb4-4585-a6eb-50c345eaca74.png');
        background-size: cover;
        background-position: center;
    }

    h1 {
        margin-bottom: 30px;
        font-size: 30px;
        color: BlueViolet;
    }

    .search-box {
        width: 300px; /* 调整搜索框宽度 */
        height: 40px; /* 调整搜索框高度 */
        padding: 10px;
        border-radius: 25px;
        background-color: #fff;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    input[type="text"] {
        width: calc(100% - 80px);
        height: 30px; /* 调整输入框高度 */
        padding: 8px;
        border: none;
        background-color: #fff;
        color: #000;
        border-radius: 20px;
        outline: none;
    }

    input[type="submit"] {
        padding: 10px 15px;
        border: none;
        border-radius: 20px;
        background-color: blue;
        color: #fff;
        cursor: pointer;
        transition: background-color 0.3s;
    }

    input[type="submit"]:hover {
        background-color: #4e92c4;
    }

    footer {
        margin-top: 25px;
        color: BlueViolet;
    }
    
</style>
</head>
<body>
    <h1>企鹅起始页</h1>
    <div class="search-box">
        <form action="https://www.cn.bing.com/search" method="get">
            <input type="text" name="q" placeholder="在这里使用必应搜索" required>
            <input type="submit" value="搜索">
        </form>
    </div>
    <footer>Copyright©2024 Hiluobo萝卜论坛网络工作室</footer>
	<a href="https://hiluobo.freeflarum.com/t/newtab" target="_blank">企鹅起始页论坛</a>
	<a href="https://icp.gov.moe/?keyword=20240069" target="_blank">萌ICP备20240069号</a>
</div>
</body>
</html>
